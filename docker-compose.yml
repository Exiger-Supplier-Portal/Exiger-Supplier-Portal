
services:
  backend:
    build: ./backend
    container_name: exiger-backend
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: exiger-frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend

  db:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: exiger-db
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  db-dev:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: exiger-db-dev
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "5433:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
      - ./db/init-dev.sql:/docker-entrypoint-initdb.d/init-dev.sql:ro
    profiles: ["dev"]

volumes:
  pgdata:

